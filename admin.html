<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studyo4 — Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1A1714;
    --mid: #3D3830;
    --accent: #C8A96E;
    --red: #C0392B;
    --red-soft: #F5D5D2;
    --orange: #E67E22;
    --orange-soft: #FAE9D3;
    --green: #27AE60;
    --green-soft: #D5EFE0;
    --border: #E0D8CC;
    --text-muted: #8A8278;
    --blue: #3498db;
    --blue-soft: #D6EAF8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); display: flex; flex-direction: column; }

  /* HEADER */
  header {
    background: var(--dark); padding: 8px 30px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--accent); flex-shrink: 0;
  }
  .logo-area { display: flex; align-items: center; gap: 16px; }
  .logo-text { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; color: var(--cream); letter-spacing: 3px; text-transform: uppercase; }
  .logo-sub { font-size: 8px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
  .admin-badge { background: var(--accent); color: var(--dark); font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
  .back-link { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; color: var(--cream); background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 20px; padding: 5px 12px; text-decoration: none; white-space: nowrap; transition: all .15s; }
  .back-link:hover { background: var(--accent); color: var(--dark); border-color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .refresh-btn { background: none; border: 1px solid rgba(255,255,255,0.15); color: var(--cream); padding: 4px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .refresh-btn:hover { background: rgba(255,255,255,0.08); }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 0; background: white;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .stat-card {
    flex: 1; padding: 12px 20px; border-right: 1px solid var(--border);
    text-align: center; transition: background 0.15s;
  }
  .stat-card:last-child { border-right: none; }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--dark); line-height: 1; }
  .sdot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  /* FILTER BAR */
  .filter-bar {
    display: flex; align-items: center; gap: 10px; padding: 10px 24px;
    background: var(--cream); border-bottom: 1px solid var(--border);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .filter-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .filter-pills { display: flex; gap: 6px; }
  .pill {
    padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: white; color: var(--text-muted);
    transition: all 0.15s; white-space: nowrap;
  }
  .pill.active { background: var(--dark); color: var(--cream); border-color: var(--dark); }
  .filter-sep { width: 1px; height: 22px; background: var(--border); }
  select.filter-sel {
    padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif; font-size: 12px; background: white; color: var(--dark);
    outline: none; cursor: pointer;
  }
  .last-upd { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-left: auto; }

  /* MAIN LAYOUT */
  .scroll-body { flex: 1 1 0; overflow-y: auto; overflow-x: hidden; }
  .main-grid { display: grid; grid-template-columns: 360px 1fr; gap: 0; min-height: 100%; }

  /* LEFT: USUÁRIOS */
  .left-panel { border-right: 1px solid var(--border); padding: 20px; background: white; }
  .panel-title { font-family: 'DM Serif Display', serif; font-size: 16px; margin-bottom: 14px; color: var(--dark); }
  .user-card {
    border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
    margin-bottom: 10px; cursor: pointer; transition: all 0.15s; background: white;
  }
  .user-card:hover { border-color: var(--accent); background: #fdfaf5; }
  .user-card.active { border-color: var(--accent); background: #fdfaf5; box-shadow: 0 0 0 2px rgba(200,169,110,0.2); }
  .user-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--dark);
    color: var(--accent); display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; font-size: 15px; flex-shrink: 0;
  }
  .user-name { font-weight: 600; font-size: 14px; color: var(--dark); }
  .user-last { font-size: 11px; color: var(--text-muted); }
  .user-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .user-tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .tag-blue   { background: var(--blue-soft); color: #1a6fa8; }
  .tag-green  { background: var(--green-soft); color: #1a6e40; }
  .tag-accent { background: #f5ecd8; color: #8a6930; }
  .tag-gray   { background: #f0ece4; color: #888; }
  .user-bar { height: 4px; border-radius: 2px; background: #eee; margin-top: 10px; overflow: hidden; }
  .user-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .no-name-card { border: 1px dashed var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; background: #fafafa; }
  .no-name-label { font-size: 11px; color: var(--text-muted); font-style: italic; }

  /* RIGHT: FEED */
  .right-panel { padding: 20px; }
  .feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .feed-count { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

  .feed-item {
    display: flex; gap: 12px; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px;
    background: white; transition: border-color 0.15s;
  }
  .feed-item:hover { border-color: #c8b898; }
  .feed-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .fd-on    { background: var(--green); }
  .fd-off   { background: #ccc; border: 1px solid #bbb; }
  .fd-obs   { background: var(--accent); }
  .feed-body { flex: 1; min-width: 0; }
  .feed-action { font-size: 13px; color: var(--dark); line-height: 1.4; }
  .feed-action strong { color: var(--dark); }
  .feed-action .stage-name { font-weight: 600; color: var(--blue); }
  .feed-action .product-name { font-style: italic; color: var(--mid); }
  .feed-meta { display: flex; gap: 10px; margin-top: 4px; align-items: center; flex-wrap: wrap; }
  .feed-user { font-size: 11px; font-weight: 600; color: var(--accent); }
  .feed-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .feed-tipo { font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 600; }

  /* ── FILTRO DE ETAPAS ────────────────────────────────────────── */
  .stage-filter-bar {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    padding: 10px 14px; background: white; border: 1px solid var(--border);
    border-radius: 8px; align-items: center;
  }
  .stage-filter-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-muted); margin-right: 4px; white-space: nowrap;
  }
  .stage-pill {
    padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: #f5f0e8;
    color: var(--text-muted); transition: all 0.15s; white-space: nowrap; user-select: none;
  }
  .stage-pill:hover { border-color: var(--accent); color: var(--dark); }
  .stage-pill.active { background: var(--dark); color: var(--cream); border-color: var(--dark); }
  .stage-pill.active:hover { opacity: 0.85; }
  .stage-filter-clear {
    font-size: 10px; color: var(--accent); cursor: pointer; font-weight: 600;
    margin-left: auto; white-space: nowrap; padding: 3px 8px;
    border: 1px solid var(--accent); border-radius: 20px; background: none;
  }
  .stage-filter-clear:hover { background: var(--accent); color: var(--dark); }
  .tipo-etapa { background: var(--blue-soft); color: #1a6fa8; }
  .tipo-obs   { background: #f5ecd8; color: #8a6930; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-text { font-size: 13px; }

  .loader { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }


  /* ── ABAS ────────────────────────────────────────────────────── */
  .tab-bar {
    display: flex; gap: 0; background: white;
    border-bottom: 2px solid var(--border); flex-shrink: 0;
    padding: 0 24px;
  }
  .tab-btn {
    padding: 10px 20px; font-size: 12px; font-weight: 600; cursor: pointer;
    border: none; background: none; color: var(--text-muted);
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    font-family: 'DM Sans', sans-serif;
  }
  .tab-btn:hover { color: var(--dark); }
  .tab-btn.active { color: var(--dark); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  /* ── ARQUIVOS CAD ─────────────────────────────────────────────── */
  .cad-grid { display: grid; grid-template-columns: 320px 1fr; gap: 0; flex: 1; min-height: 0; overflow: hidden; }
  .cad-left  { border-right: 1px solid var(--border); padding: 20px; background: white; overflow-y: auto; }
  .cad-right { padding: 20px; overflow-y: auto; }

  .ext-badge {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px; text-transform: uppercase;
    background: #f0ece4; color: var(--mid); border: 1px solid var(--border);
  }
  .ext-dwg  { background: #1a3a5c; color: white; border-color: #1a3a5c; }
  .ext-dxf  { background: #2c5a8c; color: white; border-color: #2c5a8c; }
  .ext-stp, .ext-step { background: #2e7d32; color: white; border-color: #2e7d32; }
  .ext-stl  { background: #6a1b9a; color: white; border-color: #6a1b9a; }
  .ext-pdf  { background: #c62828; color: white; border-color: #c62828; }

  .evt-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .evt-modificado { background: var(--blue-soft);   color: #1a6fa8; }
  .evt-criado     { background: var(--green-soft);   color: #1a6e40; }
  .evt-excluido   { background: var(--red-soft);     color: var(--red); }
  .evt-renomeado  { background: var(--orange-soft);  color: #8a4000; }

  .pc-card {
    border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
    margin-bottom: 8px; cursor: pointer; transition: all 0.15s; background: white;
  }
  .pc-card:hover  { border-color: var(--accent); }
  .pc-card.active { border-color: var(--accent); background: #fdfaf5; box-shadow: 0 0 0 2px rgba(200,169,110,0.2); }
  .pc-card-top  { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .pc-avatar    { width: 32px; height: 32px; border-radius: 6px; background: #1a3a5c; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .pc-name      { font-weight: 700; font-size: 13px; color: var(--dark); font-family: 'DM Mono', monospace; }
  .pc-sub       { font-size: 11px; color: var(--text-muted); }
  .pc-meta      { display: flex; gap: 6px; flex-wrap: wrap; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #f0ece4; }
  ::-webkit-scrollbar-thumb { background: #c8b898; border-radius: 3px; }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>

<script>
const SUPABASE_URL      = 'https://qzuhcbizkyvuhbshsdit.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dWhjYml6a3l2dWhic2hzZGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjkzODEsImV4cCI6MjA5NjY0NTM4MX0.aaQyk_wtitAQLjXyLGSWu1DniU3rLqk3Vb6ClhtWuaM';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STAGES       = ['modelagem3d','extracaoGab','programacao','montagem','preparacao','espumacao','modelagemTec','costura','tapecaria','montFinal'];
const STAGE_LABELS = ['Modelagem 3D','Extração Gabarito','Programação','Montagem','Preparação','Espumação','Modelagem Téc.','Costura','Tapeçaria','Montagem Final'];

let allLogs  = [];   // etapa_logs
let allObs   = [];   // pedido_observacoes
let combined = [];   // merge dos dois
let activeRange    = 1;
let activeUser     = '';
let activeUserCard = null;
let selectedStages = new Set();  // etapas selecionadas no filtro (vazio = todas)

/* ── DATAS ────────────────────────────────────────── */
function startOfRange(days) {
  if (!days) return null;
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - (days - 1));
  return d;
}

function fmtDatetime(iso) {
  const d = new Date(iso);
  const today   = new Date(); today.setHours(0,0,0,0);
  const itemDay = new Date(d); itemDay.setHours(0,0,0,0);
  const diffDays = Math.floor((today - itemDay) / 86400000);
  const time = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  if (diffDays === 0) return `Hoje, ${time}`;
  if (diffDays === 1) return `Ontem, ${time}`;
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }) + ` ${time}`;
}

/* ── CARGA ────────────────────────────────────────── */
async function loadAll() {
  document.getElementById('lastUpd').textContent = 'Atualizando...';

  const since = startOfRange(activeRange);

  let logQuery = sb.from('etapa_logs')
    .select('produto, n_pedido, etapa, status, created_at, usuario')
    .order('created_at', { ascending: false });
  if (since) logQuery = logQuery.gte('created_at', since.toISOString());

  let obsQuery = sb.from('pedido_observacoes')
    .select('produto, n_pedido, texto, autor, created_at')
    .order('created_at', { ascending: false });
  if (since) obsQuery = obsQuery.gte('created_at', since.toISOString());

  const [logRes, obsRes] = await Promise.all([logQuery, obsQuery]);

  allLogs = (logRes.data || []);
  allObs  = (obsRes.data || []);

  // Unifica num feed só
  combined = [
    ...allLogs.map(r => ({
      tipo:     'etapa',
      usuario:  r.usuario || null,
      produto:  r.produto,
      n_pedido: r.n_pedido,
      etapa:    r.etapa,
      status:   r.status,
      texto:    null,
      created_at: r.created_at,
    })),
    ...allObs.map(r => ({
      tipo:     'obs',
      usuario:  r.autor || null,
      produto:  r.produto,
      n_pedido: r.n_pedido,
      etapa:    null,
      status:   null,
      texto:    r.texto,
      created_at: r.created_at,
    })),
  ].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  const now = new Date();
  document.getElementById('lastUpd').textContent =
    `Atualizado: ${now.toLocaleTimeString('pt-BR')}`;

  populateUserFilter();
  renderStats();
  renderUsers();
  renderFeed();
}

/* ── FILTROS ──────────────────────────────────────── */
function setRange(days, el) {
  activeRange = days;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  // reset user filter
  activeUser = '';
  document.getElementById('filterUser').value = '';
  if (activeUserCard) { activeUserCard.classList.remove('active'); activeUserCard = null; }
  loadAll();
}

function populateUserFilter() {
  const users = [...new Set(combined.map(r => r.usuario).filter(Boolean))].sort();
  const sel = document.getElementById('filterUser');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos</option>';
  users.forEach(u => sel.innerHTML += `<option value="${u}">${u}</option>`);
  sel.value = cur;
}

function currentFiltered() {
  const userSel  = document.getElementById('filterUser').value;
  const tipoSel  = document.getElementById('filterTipo').value;
  return combined.filter(r => {
    const okUser  = !userSel  || r.usuario === userSel;
    const okTipo  = !tipoSel  || r.tipo === tipoSel;
    // Filtro de etapas: só aplica em registros do tipo 'etapa'; obs sempre passam
    const okEtapa = r.tipo !== 'etapa' || selectedStages.size === 0 || selectedStages.has(r.etapa);
    return okUser && okTipo && okEtapa;
  });
}

/* ── FILTRO DE ETAPAS ─────────────────────────────── */
function buildStagePills() {
  const container = document.getElementById('stagePills');
  container.innerHTML = '';
  STAGES.forEach((key, i) => {
    const pill = document.createElement('span');
    pill.className = 'stage-pill' + (selectedStages.has(key) ? ' active' : '');
    pill.textContent = STAGE_LABELS[i];
    pill.dataset.key = key;
    pill.onclick = () => toggleStagePill(key, pill);
    container.appendChild(pill);
  });
  updateClearBtn();
}

function toggleStagePill(key, pill) {
  if (selectedStages.has(key)) {
    selectedStages.delete(key);
    pill.classList.remove('active');
  } else {
    selectedStages.add(key);
    pill.classList.add('active');
  }
  updateClearBtn();
  renderFeed();
}

function clearStageFilter() {
  selectedStages.clear();
  document.querySelectorAll('.stage-pill').forEach(p => p.classList.remove('active'));
  updateClearBtn();
  renderFeed();
}

function updateClearBtn() {
  document.getElementById('stageClearBtn').style.display =
    selectedStages.size > 0 ? 'inline-block' : 'none';
}

/* ── STATS ────────────────────────────────────────── */
function renderStats() {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const acoesHoje = combined.filter(r => new Date(r.created_at) >= hoje).length;
  const users = new Set(combined.map(r => r.usuario).filter(Boolean)).size;
  const done  = allLogs.filter(r => r.status === true).length;
  const obs   = allObs.length;

  document.getElementById('cntTotal').textContent = combined.length;
  document.getElementById('cntUsers').textContent = users;
  document.getElementById('cntDone').textContent  = done;
  document.getElementById('cntObs').textContent   = obs;
  document.getElementById('cntHoje').textContent  = acoesHoje;
}

/* ── USUÁRIOS ─────────────────────────────────────── */
function renderUsers() {
  // Agrupa por usuário
  const map = {};
  combined.forEach(r => {
    const key = r.usuario || '__anonimo__';
    if (!map[key]) map[key] = { nome: r.usuario, total: 0, etapas: 0, obs: 0, produtos: new Set(), ultima: null };
    map[key].total++;
    if (r.tipo === 'etapa') map[key].etapas++;
    if (r.tipo === 'obs')   map[key].obs++;
    map[key].produtos.add(r.produto);
    if (!map[key].ultima || r.created_at > map[key].ultima) map[key].ultima = r.created_at;
  });

  const sorted = Object.values(map).sort((a, b) => b.total - a.total);
  const maxTotal = sorted[0]?.total || 1;

  if (!sorted.length) {
    document.getElementById('userList').innerHTML =
      '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">Nenhuma atividade no período.</div></div>';
    return;
  }

  document.getElementById('userList').innerHTML = sorted.map(u => {
    const isAnon = !u.nome;
    const initials = isAnon ? '?' : u.nome.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
    const pct = Math.round((u.total / maxTotal) * 100);
    const ultimaStr = u.ultima ? fmtDatetime(u.ultima) : '—';

    if (isAnon) {
      return `<div class="no-name-card">
        <div class="no-name-label">⚠ ${u.total} ação(ões) sem usuário identificado</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:4px">Última: ${ultimaStr}</div>
      </div>`;
    }

    return `<div class="user-card" onclick="filterByUser('${u.nome.replace(/'/g,"\\'")}', this)">
      <div class="user-card-top">
        <div class="user-avatar">${initials}</div>
        <div>
          <div class="user-name">${u.nome}</div>
          <div class="user-last">Última ação: ${ultimaStr}</div>
        </div>
      </div>
      <div class="user-meta">
        <span class="user-tag tag-blue">${u.total} ação(ões)</span>
        <span class="user-tag tag-green">${u.etapas} etapa(s)</span>
        ${u.obs ? `<span class="user-tag tag-accent">${u.obs} obs.</span>` : ''}
        <span class="user-tag tag-gray">${u.produtos.size} produto(s)</span>
      </div>
      <div class="user-bar"><div class="user-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function filterByUser(nome, card) {
  const sel = document.getElementById('filterUser');
  if (activeUser === nome) {
    // deselect
    activeUser = '';
    sel.value = '';
    card.classList.remove('active');
    activeUserCard = null;
  } else {
    activeUser = nome;
    sel.value = nome;
    if (activeUserCard) activeUserCard.classList.remove('active');
    card.classList.add('active');
    activeUserCard = card;
  }
  renderFeed();
}

/* ── FEED ─────────────────────────────────────────── */
function renderFeed() {
  const filtered = currentFiltered();
  document.getElementById('feedCount').textContent = `${filtered.length} registro(s)`;

  if (!filtered.length) {
    document.getElementById('feedList').innerHTML =
      '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhum registro encontrado para os filtros selecionados.</div></div>';
    return;
  }

  document.getElementById('feedList').innerHTML = filtered.map(r => {
    const userStr = r.usuario
      ? `<span class="feed-user">👤 ${r.usuario}</span>`
      : `<span class="feed-user" style="color:var(--text-muted)">👤 sem identificação</span>`;

    if (r.tipo === 'etapa') {
      const idx = STAGES.indexOf(r.etapa);
      const label = idx >= 0 ? STAGE_LABELS[idx] : r.etapa;
      const acao  = r.status ? 'concluiu' : 'desmarcou';
      const dotCls = r.status ? 'fd-on' : 'fd-off';
      const prodStr = r.n_pedido ? `${r.produto} <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted)">#${r.n_pedido}</span>` : r.produto;
      return `<div class="feed-item">
        <div class="feed-dot ${dotCls}"></div>
        <div class="feed-body">
          <div class="feed-action">
            <span class="stage-name">${label}</span>
            — ${acao} em
            <span class="product-name">${prodStr}</span>
          </div>
          <div class="feed-meta">
            ${userStr}
            <span class="feed-time">${fmtDatetime(r.created_at)}</span>
            <span class="feed-tipo tipo-etapa">Etapa</span>
          </div>
        </div>
      </div>`;
    } else {
      const prodStr = r.n_pedido ? `${r.produto} <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted)">#${r.n_pedido}</span>` : r.produto;
      return `<div class="feed-item">
        <div class="feed-dot fd-obs"></div>
        <div class="feed-body">
          <div class="feed-action">
            Observação em <span class="product-name">${prodStr}</span>:
            <span style="color:var(--mid)">"${r.texto}"</span>
          </div>
          <div class="feed-meta">
            ${userStr}
            <span class="feed-time">${fmtDatetime(r.created_at)}</span>
            <span class="feed-tipo tipo-obs">Observação</span>
          </div>
        </div>
      </div>`;
    }
  }).join('');
}

/* ── INIT ─────────────────────────────────────────── */
function updateHeaderDate() {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
updateHeaderDate();
setInterval(updateHeaderDate, 60000);
setInterval(loadAll, 60000); // auto-refresh a cada 1 min
buildStagePills();
loadAll();
/* ── ABAS ─────────────────────────────────────────────────── */
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'solic' && !solCarregado) { loadSolicitacoes(); }
}

/* ── SOLICITAÇÕES ──────────────────────────────────────────── */
let solLista = [], solUsuarios = [], solCarregado = false, solDiasAlerta = 3;
let solPessoaAtiva = null;

const SOL_LBL = { aberta:'Aberta', em_andamento:'Em andamento', concluida:'Concluída', cancelada:'Cancelada' };
const solNome = id => (solUsuarios.find(u => u.id === id) || {}).nome || '—';
function solDiasParado(s) { return Math.floor((Date.now() - new Date(s.updated_at).getTime()) / 86400000); }
function solEstaParada(s) {
  return (s.status === 'aberta' || s.status === 'em_andamento') && solDiasParado(s) >= solDiasAlerta;
}

async function loadSolicitacoes() {
  const [sols, users, cfg] = await Promise.all([
    sb.from('solicitacoes').select('*').order('created_at', { ascending:false }),
    sb.from('usuarios').select('id,nome').order('nome'),
    sb.from('configuracoes').select('valor').eq('chave','dias_alerta_solicitacao').maybeSingle()
  ]);
  if (sols.error) { console.error('Erro ao buscar solicitacoes:', sols.error); return; }
  solLista    = sols.data || [];
  solUsuarios = users.data || [];
  if (cfg.data && cfg.data.valor) solDiasAlerta = parseInt(cfg.data.valor) || 3;
  solCarregado = true;
  popularSolFiltros();
  renderSolPessoas();
  renderSolFeed();
}

function popularSolFiltros() {
  const sel = document.getElementById('solFilterResp');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos os responsáveis</option>' +
    solUsuarios.map(u => `<option value="${u.id}">${u.nome}</option>`).join('');
  sel.value = cur;
  const opt = document.querySelector('#solFilterAtraso option[value="paradas"]');
  if (opt) opt.textContent = `Somente paradas (+${solDiasAlerta} dias)`;
}

/* Painel esquerdo: carga por pessoa */
function renderSolPessoas() {
  const el = document.getElementById('solPessoas');
  const stats = solUsuarios.map(u => {
    const minhas  = solLista.filter(s => s.responsavel_id === u.id);
    const abertas = minhas.filter(s => s.status === 'aberta' || s.status === 'em_andamento').length;
    const paradas = minhas.filter(solEstaParada).length;
    const concl   = minhas.filter(s => s.status === 'concluida').length;
    return { id:u.id, nome:u.nome, total:minhas.length, abertas, paradas, concl };
  }).filter(x => x.total > 0).sort((a,b) => b.abertas - a.abertas || b.total - a.total);

  if (!stats.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📨</div><div class="empty-text">Nenhuma solicitação registrada.</div></div>';
    return;
  }
  const maxAb = Math.max(...stats.map(s => s.abertas), 1);
  el.innerHTML = stats.map(x => {
    const iniciais = x.nome.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
    const pct = Math.round((x.abertas / maxAb) * 100);
    return `<div class="user-card" onclick="filtrarPorPessoa('${x.id}', this)">
      <div class="user-card-top">
        <div class="user-avatar">${iniciais}</div>
        <div>
          <div class="user-name">${x.nome}</div>
          <div class="user-last">${x.abertas} em aberto · ${x.concl} concluída(s)</div>
        </div>
      </div>
      <div class="user-meta">
        <span class="user-tag tag-blue">${x.total} total</span>
        <span class="user-tag tag-green">${x.concl} concluída(s)</span>
        ${x.paradas ? `<span class="user-tag tag-accent">⚠ ${x.paradas} parada(s)</span>` : ''}
      </div>
      <div class="user-bar"><div class="user-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function filtrarPorPessoa(id, card) {
  const sel = document.getElementById('solFilterResp');
  if (solPessoaAtiva === id) {
    solPessoaAtiva = null; sel.value = '';
    card.classList.remove('active');
  } else {
    document.querySelectorAll('#solPessoas .user-card').forEach(c => c.classList.remove('active'));
    solPessoaAtiva = id; sel.value = id;
    card.classList.add('active');
  }
  renderSolFeed();
}

/* Painel direito: lista com filtros */
function renderSolFeed() {
  const st     = document.getElementById('solFilterStatus').value;
  const resp   = document.getElementById('solFilterResp').value;
  const atraso = document.getElementById('solFilterAtraso').value;

  const lista = solLista.filter(s => {
    if (st && s.status !== st) return false;
    if (resp && s.responsavel_id !== resp) return false;
    if (atraso === 'paradas' && !solEstaParada(s)) return false;
    return true;
  });

  document.getElementById('solFeedCount').textContent = `${lista.length} solicitação(ões)`;
  const el = document.getElementById('solFeedList');
  if (!lista.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Nada com esses filtros.</div></div>';
    return;
  }

  el.innerHTML = lista.map(s => {
    const vinc = (s.pedido_ref || s.produto_ref)
      ? ` <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted)">🔗 ${[s.pedido_ref, s.produto_ref].filter(Boolean).join(' · ')}</span>` : '';
    const parada = solEstaParada(s)
      ? ` <span class="user-tag tag-accent">⚠ parada ${solDiasParado(s)}d</span>` : '';
    return `<div class="feed-item">
      <div class="feed-dot ${s.status === 'concluida' ? 'fd-etapa' : 'fd-obs'}"></div>
      <div class="feed-body">
        <div class="feed-action">
          <span class="stage-name">${s.titulo}</span>${vinc}${parada}
        </div>
        <div class="feed-meta">
          <span>${solNome(s.criador_id)} → <strong>${solNome(s.responsavel_id)}</strong></span>
          <span class="feed-time">${fmtDatetime(s.created_at)}</span>
          <span class="feed-tipo ${s.status === 'concluida' ? 'tipo-etapa' : 'tipo-obs'}">${SOL_LBL[s.status]}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

</script>
